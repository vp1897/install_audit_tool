<body>
    <div id="root" class="w-full min-h-screen bg-white"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Constants
        const N8N_WEBHOOK_URL = 'https://vergesense.app.n8n.cloud/webhook/06f54acf-6ee5-4ed8-9367-05e6f5a73635';
        const PURPLE = '#6B4EFF';

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC07qgOeFvavF9vZIbG9v-GwgMovjFZTMU",
            authDomain: "vergesense-site-survey.firebaseapp.com",

        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ============================================
        // HELPER FUNCTIONS
        // ============================================

        const isVSEmployee = (email) => email && email.endsWith('@vergesense.com');

        const getTechName = () => localStorage.getItem('techName') || '';

        const saveTechName = (name) => localStorage.setItem('techName', name);

        const VS_CONTACTS = [
            { name: "Victoria Philbin", email: "victoria@vergesense.com" },
            { name: "Marcus Byrd", email: "marcus.byrd@vergesense.com" },
            { name: "Maria Sapriza-Munoz", email: "maria.sapriza@vergesense.com" },
            { name: "Aaron Jerabek", email: "aaron@vergesense.com" },
            { name: "Michelle Jackson", email: "michelle.jackson@vergesense.com" },
            { name: "Charles Cruz", email: "charles.cruz@vergesense.com" },
            { name: "Hui Hwan Tan", email: "huihwan.tan@vergesense.com" },
            { name: "Adam Gaxiola", email: "adam.gaxiola@vergesense.com" },
            { name: "Giancarlo Arechiga", email: "giancarlo@vergesense.com" },
            { name: "Other (enter below)", email: "" }
        ];

        // Check if a parsed device name looks like a valid device ID (e.g. "30B-UA3", "H00-123", "AA:BB:CC:DD:EE:FF")
        const isValidDeviceName = (name) => {
            if (!name || name.length < 3) return false;
            // Must contain at least one letter and one digit or colon/dash
            return /[a-zA-Z]/.test(name) && /[\d:.-]/.test(name);
        };

        const formatDeviceName = (device) => {
            if (isValidDeviceName(device.name)) return device.name;
            return '';
        };

        const generateTechCode = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        };

        // ============================================
        // PDF RENDERING + DEVICE ICON DETECTION
        // (Same approach as the site survey tool — canvas pixel color scanning)
        // ============================================

        // Render PDF page 1 to a canvas at given scale
        const renderPdfToCanvas = async (pdfData, scale) => {
            const pdf = await pdfjsLib.getDocument(pdfData).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            return { canvas, page, pdf };
        };

        // Find the Y position where the device table starts
        const findTableTopY = async (page, scale) => {
            const textContent = await page.getTextContent();
            const viewport = page.getViewport({ scale: 1 });

            // Collect all text items with their positions
            const items = textContent.items.map(item => ({
                text: item.str.trim(),
                pdfY: item.transform[5],
                canvasY: Math.floor((viewport.height - item.transform[5]) * scale)
            }));

            // Look for table header keywords: "Name", "Status", "Firmware Version"
            // The table header row has these together. Find the lowest one on the page
            // (highest canvasY = further down the page)
            const tableKeywords = ['Status', 'Firmware Version', 'Firmware', 'Battery'];
            let bestCanvasY = null;

            for (const item of items) {
                if (item.text === 'Name') {
                    // Check if there are other table header keywords near the same Y
                    const nearbyHeaders = items.filter(other =>
                        tableKeywords.includes(other.text) &&
                        Math.abs(other.pdfY - (viewport.height - item.canvasY / scale)) < 5
                    );
                    // If "Name" appears with other table headers, this is the device table
                    if (nearbyHeaders.length >= 1) {
                        const y = item.canvasY;
                        if (bestCanvasY === null || y > bestCanvasY) bestCanvasY = y;
                    }
                }
            }

            // If found, add a small offset above the header text
            if (bestCanvasY !== null) {
                console.log('[Crop] Found device table at canvasY:', bestCanvasY, 'of', viewport.height * scale);
                return Math.max(0, bestCanvasY - 10);
            }

            // Fallback: look for ANY "Name" text in the lower half of the page
            for (const item of items) {
                if (item.text === 'Name' && item.canvasY > viewport.height * scale * 0.4) {
                    console.log('[Crop] Fallback: found "Name" at canvasY:', item.canvasY);
                    return Math.max(0, item.canvasY - 10);
                }
            }

            // Last resort: table starts at ~65% down the page
            console.log('[Crop] No table header found, using 65% fallback');
            return Math.floor(viewport.height * scale * 0.65);
        };

        // Extract map image: render full page 1, crop everything above the device table
        const extractMapImage = async (pdfData) => {
            const { canvas, page } = await renderPdfToCanvas(pdfData, 2);
            const tableTopY = await findTableTopY(page, 2);

            console.log('[Crop] Canvas size:', canvas.width, 'x', canvas.height, 'tableTopY:', tableTopY);

            // Crop from top of page down to just above the device table
            const mapHeight = Math.min(canvas.height, tableTopY);

            if (mapHeight <= 100) {
                // Something went wrong with table detection — use full page
                console.log('[Crop] Table detection failed, using full page');
                return canvas.toDataURL('image/jpeg', 0.85);
            }

            const mapCanvas = document.createElement('canvas');
            mapCanvas.width = canvas.width;
            mapCanvas.height = mapHeight;
            mapCanvas.getContext('2d').drawImage(
                canvas, 0, 0, canvas.width, mapHeight,
                0, 0, mapCanvas.width, mapCanvas.height
            );
            return mapCanvas.toDataURL('image/jpeg', 0.85);
        };

        const parsePdfDevices = async (pdfData) => {
            const pdf = await pdfjsLib.getDocument(pdfData).promise;
            const devices = [];
            const deviceNumbers = new Set();

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                const viewport = page.getViewport({ scale: 1 });

                // Find where the table starts on this page
                let tableStartY = null;
                for (const item of textContent.items) {
                    if (item.str.trim() === 'Name' || item.str.trim() === 'Status') {
                        tableStartY = item.transform[5];
                        break;
                    }
                }

                // Only parse items that are in the table area (below the header on page 1, or all items on subsequent pages)
                const tableItems = textContent.items.filter(item => {
                    if (pageNum > 1) return true; // subsequent pages are all table
                    if (!tableStartY) return false;
                    return item.transform[5] <= tableStartY + 5; // at or below table header
                });

                // Sort items by Y position (descending = top to bottom in reading order) then X
                tableItems.sort((a, b) => {
                    const yDiff = b.transform[5] - a.transform[5];
                    if (Math.abs(yDiff) < 5) return a.transform[4] - b.transform[4]; // same row, sort by X
                    return yDiff;
                });

                // Group items into rows by Y position
                const rows = [];
                let currentRow = [];
                let lastY = null;
                for (const item of tableItems) {
                    const text = item.str.trim();
                    if (!text) continue;
                    const y = item.transform[5];
                    if (lastY === null || Math.abs(y - lastY) < 8) {
                        currentRow.push(text);
                    } else {
                        if (currentRow.length > 0) rows.push(currentRow);
                        currentRow = [text];
                    }
                    lastY = y;
                }
                if (currentRow.length > 0) rows.push(currentRow);

                // Status/state/firmware/battery keywords for field detection
                const STATUS_WORDS = ['Online', 'Offline'];
                const STATE_WORDS = ['Operational', 'Error', 'Warning', 'Inactive'];
                const BATTERY_WORDS = ['Wired', 'Healthy', 'Low'];
                const isKnownField = (text) => STATUS_WORDS.includes(text) || STATE_WORDS.includes(text) ||
                    BATTERY_WORDS.includes(text) || /^\d+\.\d+\.\d+/.test(text);

                // Parse rows into device records
                for (const row of rows) {
                    if (row.includes('Name') || row.includes('Status') || row.includes('Firmware Version')) continue;

                    const firstItem = row[0];
                    if (/^\d{1,3}$/.test(firstItem)) {
                        const num = parseInt(firstItem);
                        if (num > 0 && num <= 999 && !deviceNumbers.has(num)) {
                            deviceNumbers.add(num);
                            const device = { number: num, name: '', status: '', state: '', firmware: '', battery: '' };

                            // Join all text items before the first known field keyword as the device name
                            let nameFragments = [];
                            let pastName = false;
                            for (let i = 1; i < row.length; i++) {
                                const text = row[i];
                                if (!pastName && isKnownField(text)) {
                                    pastName = true;
                                }
                                if (!pastName) {
                                    nameFragments.push(text);
                                } else {
                                    if (!device.status && STATUS_WORDS.includes(text)) device.status = text;
                                    else if (!device.state && STATE_WORDS.includes(text)) device.state = text;
                                    else if (!device.firmware && /^\d+\.\d+\.\d+/.test(text)) device.firmware = text;
                                    else if (!device.battery && BATTERY_WORDS.includes(text)) device.battery = text;
                                }
                            }
                            device.name = nameFragments.join('') || '';
                            devices.push(device);
                        }
                    }
                }
            }

            return devices.sort((a, b) => a.number - b.number);
        };

        // Detect device icon positions by scanning canvas pixels for colored markers
        // Same approach as the site survey tool's detectDevicesOnCanvas
        const detectDevicePositionsFromCanvas = (canvas, tableTopY, numDevices) => {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const scanH = Math.min(tableTopY || h, h); // Only scan above the table
            const data = ctx.getImageData(0, 0, w, scanH).data;

            // VergeSense device markers are purple/blue colored icons on the floor plan
            // Detect pixels that are distinctly blue-purple (not gray, not black, not white)
            const isDeviceMarker = (r, g, b) => {
                // Must have significant blue component and be "colorful" (not gray)
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const saturation = max - min;
                // Purple/blue markers: high blue, lower red/green, good saturation
                if (b > 120 && saturation > 40 && b >= r && b >= g) return true;
                // Also catch purple: high blue AND moderate red, low green
                if (b > 100 && r > 80 && g < 130 && saturation > 35) return true;
                return false;
            };

            // Grid-based clustering: divide canvas into cells
            const gridSize = Math.max(8, Math.floor(w / 150));
            const gridW = Math.ceil(w / gridSize);
            const gridH = Math.ceil(scanH / gridSize);
            const grid = new Array(gridW * gridH).fill(0);

            // Count marker pixels per grid cell
            for (let y = 0; y < scanH; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    if (isDeviceMarker(data[idx], data[idx+1], data[idx+2])) {
                        const gx = Math.floor(x / gridSize);
                        const gy = Math.floor(y / gridSize);
                        grid[gy * gridW + gx]++;
                    }
                }
            }

            // Find cells with enough marker pixels (at least 15% of cell area)
            const minPixels = Math.floor(gridSize * gridSize * 0.08);
            const hotCells = [];
            for (let gy = 0; gy < gridH; gy++) {
                for (let gx = 0; gx < gridW; gx++) {
                    if (grid[gy * gridW + gx] >= minPixels) {
                        hotCells.push({ x: gx, y: gy, count: grid[gy * gridW + gx] });
                    }
                }
            }

            // Merge adjacent hot cells into clusters
            const visited = new Set();
            const clusters = [];
            const flood = (startGx, startGy) => {
                const stack = [[startGx, startGy]];
                const cells = [];
                while (stack.length) {
                    const [cx, cy] = stack.pop();
                    const key = `${cx},${cy}`;
                    if (visited.has(key)) continue;
                    visited.add(key);
                    const cell = hotCells.find(c => c.x === cx && c.y === cy);
                    if (!cell) continue;
                    cells.push(cell);
                    // Check neighbors (including diagonals)
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = cx + dx, ny = cy + dy;
                            if (!visited.has(`${nx},${ny}`) && hotCells.find(c => c.x === nx && c.y === ny)) {
                                stack.push([nx, ny]);
                            }
                        }
                    }
                }
                return cells;
            };

            for (const cell of hotCells) {
                if (!visited.has(`${cell.x},${cell.y}`)) {
                    const clusterCells = flood(cell.x, cell.y);
                    if (clusterCells.length > 0 && clusterCells.length < 20) {
                        // Calculate cluster center
                        let totalWeight = 0, sumX = 0, sumY = 0;
                        for (const c of clusterCells) {
                            sumX += (c.x + 0.5) * gridSize * c.count;
                            sumY += (c.y + 0.5) * gridSize * c.count;
                            totalWeight += c.count;
                        }
                        clusters.push({
                            x: sumX / totalWeight,
                            y: sumY / totalWeight,
                            size: clusterCells.length
                        });
                    }
                }
            }

            console.log('[Pin Detect] Found', clusters.length, 'colored marker clusters for', numDevices, 'devices');
            console.log('[Pin Detect] Sample clusters:', clusters.slice(0, 5).map(c =>
                `(${(c.x/w*100).toFixed(1)}%, ${(c.y/scanH*100).toFixed(1)}%)`
            ).join(', '));

            return clusters;
        };

        // Match detected clusters to devices by sorting both spatially
        const matchClustersToDevices = (clusters, devices, canvasW, canvasH) => {
            const positions = {};
            if (clusters.length === 0 || devices.length === 0) return positions;

            // Sort clusters top-to-bottom, left-to-right (reading order)
            // This matches how device numbers are typically assigned on floor plans
            const sorted = [...clusters].sort((a, b) => {
                const rowA = Math.floor(a.y / (canvasH * 0.05));
                const rowB = Math.floor(b.y / (canvasH * 0.05));
                if (rowA !== rowB) return rowA - rowB;
                return a.x - b.x;
            });

            // If cluster count is close to device count, assign 1:1
            const devicesSorted = [...devices].sort((a, b) => a.number - b.number);

            if (sorted.length >= devicesSorted.length * 0.5) {
                // Assign clusters to devices in order
                const count = Math.min(sorted.length, devicesSorted.length);
                for (let i = 0; i < count; i++) {
                    const cluster = sorted[i];
                    const device = devicesSorted[i];
                    positions[device.number] = {
                        pinX: Math.max(1, Math.min(99, (cluster.x / canvasW) * 100)),
                        pinY: Math.max(1, Math.min(99, (cluster.y / canvasH) * 100))
                    };
                }
            }

            console.log('[Pin Detect] Matched', Object.keys(positions).length, 'devices to positions');
            return positions;
        };

        // Detect device positions by scanning the rendered PDF for colored markers
        const extractDevicePositions = async (pdfData, devices) => {
            const { canvas, page } = await renderPdfToCanvas(pdfData, 2);
            const tableTopY = await findTableTopY(page, 2);
            const mapHeight = Math.min(tableTopY, canvas.height);

            const clusters = detectDevicePositionsFromCanvas(canvas, tableTopY, devices.length);

            // Cluster positions are already in canvas coords starting from top
            // The map image is cropped from y=0 to y=mapHeight, so positions map directly
            const validClusters = clusters.filter(c => c.y > 0 && c.y < mapHeight);

            return matchClustersToDevices(validClusters, devices, canvas.width, mapHeight);
        };

        const autoDetectDeviceType = (device, devices, floorDevices) => {
            const name = device.name.toUpperCase();
            const firmware = device.firmware.toUpperCase();
            const battery = device.battery.toUpperCase();

            // Rule 1: MAC address pattern → EN1
            if (/^([0-9A-F]{2}:){5}[0-9A-F]{2}$/i.test(device.name)) {
                return 'EN1';
            }

            // Rule 2: Gateway detection (Wired + firmware 1.x OR name starts with H00)
            if ((battery === 'WIRED' && firmware.startsWith('1.')) || name.startsWith('H00-')) {
                return 'GW';
            }

            // Rule 3 & 4: Check if gateways exist on floor
            const hasGateway = floorDevices && floorDevices.some(d => d.deviceType === 'GW' || d.name.toUpperCase().startsWith('H00-'));
            if (hasGateway) {
                return 'L410';
            }

            return 'E106';
        };

        // ============================================
        // AUTHENTICATION SCREEN
        // ============================================

        function AuthScreen({ onAuthComplete, onTechCodeAuth }) {
            const [isSigningIn, setIsSigningIn] = useState(false);
            const [showTechForm, setShowTechForm] = useState(false);
            const [techName, setTechName] = useState(getTechName() || '');
            const [techCode, setTechCode] = useState('');
            const [codeError, setCodeError] = useState('');

            const handleGoogleSignIn = () => {
                setIsSigningIn(true);
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ hd: 'vergesense.com' });
                auth.signInWithPopup(provider).catch((err) => {
                    console.error('Google sign-in failed:', err);
                    alert('Sign-in failed: ' + err.message);
                    setIsSigningIn(false);
                });
            };

            const handleTechContinue = async () => {
                if (!techName.trim()) {
                    alert('Please enter your name');
                    return;
                }
                if (!techCode.trim()) {
                    setCodeError('Please enter the project code provided by your VergeSense contact');
                    return;
                }
                setIsSigningIn(true);
                setCodeError('');
                try {
                    // Look up project by tech code
                    const snapshot = await db.collection('installAudits')
                        .where('techCode', '==', techCode.trim().toUpperCase())
                        .get();

                    if (snapshot.empty) {
                        setCodeError('Invalid project code. Please check with your VergeSense contact.');
                        setIsSigningIn(false);
                        return;
                    }

                    const projectDoc = snapshot.docs[0];
                    const project = { id: projectDoc.id, ...projectDoc.data() };

                    // Session persistence so tech is signed out when app/tab closes
                    await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
                    await auth.signInAnonymously();
                    saveTechName(techName.trim());
                    onTechCodeAuth(project, techName.trim());
                } catch (err) {
                    console.error('Tech sign-in failed:', err);
                    alert('Sign-in failed. Please try again.');
                    setIsSigningIn(false);
                }
            };

            return (
                <div className="w-full min-h-screen bg-white flex items-center justify-center p-4">
                    <div className="w-full max-w-md">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-bold custom-purple mb-2">VergeSense</h1>
                            <p className="text-xl text-gray-600">Install Audit Tool</p>
                        </div>

                        <div className="space-y-4">
                            {!showTechForm ? (
                                <>
                                    <button

                    return;
                }

                setSaving(true);

        // ============================================
        // FLOOR PLAN MAP (with pinch-to-zoom + pan)
        // ============================================

        function FloorPlanMap({ mapImage, devices, onSelectDevice, height, highlightDevice }) {
            const wrapRef = useRef(null);
            const pinchRef = useRef(null);
            const [zoom, setZoom] = useState(1);
            const zoomRef = useRef(1);

            const clampZoom = (z) => Math.min(Math.max(z, 1), 5);

            // Keep ref in sync
            useEffect(() => { zoomRef.current = zoom; }, [zoom]);

            // Pinch-to-zoom and ctrl+wheel zoom
            useEffect(() => {
                const el = wrapRef.current;
                if (!el) return;
                const getDist = (t) => Math.hypot(
                    t[0].clientX - t[1].clientX,
                    t[0].clientY - t[1].clientY
                );
                const onTouchStart = (e) => {
                    if (e.touches.length === 2) {
                        pinchRef.current = {
                            startDist: getDist(e.touches),
                            startZoom: zoomRef.current
                        };
                    }
                };
                const onTouchMove = (e) => {
                    if (!pinchRef.current || e.touches.length !== 2) return;
                    e.preventDefault();
                    const newZoom = clampZoom(
                        pinchRef.current.startZoom * (getDist(e.touches) / pinchRef.current.startDist)
                    );
                    setZoom(newZoom);
                };
                const onTouchEnd = () => { pinchRef.current = null; };
                const onWheel = (e) => {
                    if (!e.ctrlKey && !e.metaKey) return;
                    e.preventDefault();
                    setZoom(z => clampZoom(z * (1 - e.deltaY * 0.008)));
                };
                el.addEventListener('touchstart', onTouchStart, { passive: true });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('wheel', onWheel, { passive: false });
                return () => {
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('wheel', onWheel);
                };
            }, []);

            const devs = devices || [];
            const hasRealPositions = devs.some(d => d.pinX > 0 && d.pinY > 0);

            return (
                <div
                    className="select-none border-2 border-gray-200 transition-colors"
                    style={{ position: 'relative', borderRadius: '0.75rem' }}
                >
                    {/* Zoom controls */}
                    <div style={{ position: 'absolute', top: 8, right: 8, zIndex: 20, display: 'flex', flexDirection: 'column', gap: 4 }}>
                        <button

                        >+</button>
                        <button
                            onClick={() => setZoom(z => clampZoom(z / 1.5))}
                            style={{ width: 28, height: 28, borderRadius: '50%', background: 'white', border: '1px solid #ccc', fontSize: 16, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.15)' }}

                    {/* Highlighted device indicator */}
                    {highlightDevice && (

                            Find #{highlightDevice.number} on the map

                    <div

                        style={{
                            overflow: 'auto',
                            maxHeight: height || 500,
                            borderRadius: '0.75rem',
                            WebkitOverflowScrolling: 'touch'
                        }}
                    >
                        <div style={{ width: `${zoom * 100}%`, position: 'relative' }}>
                            <img
                                src={mapImage}
                                alt="Floor plan"
                                className="map-image"
                            />
                            {hasRealPositions && devs.map((device) => (
                                device.pinX > 0 && device.pinY > 0 ? (
                                    <button
                                        key={device.number}
                                        onClick={(e) => { e.stopPropagation(); onSelectDevice(device); }}
                                        className={`device-pin ${device.complete ? 'completed' : ''}`}
                                        style={{

                                    >
                                        {device.number}
                                    </button>
                                ) : null
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // ZOOMED MAP PREVIEW (device detail)
        // ============================================

        function ZoomedPreview({ mapImage, device, allDevices, onSelectDevice }) {
            const devs = allDevices || [];
            const hasRealPos = device.pinX > 0 && device.pinY > 0;
            const wrapRef = useRef(null);
            const pinchRef = useRef(null);
            const [zoom, setZoom] = useState(hasRealPos ? 3 : 1);
            const zoomRef = useRef(hasRealPos ? 3 : 1);

            const clampZoom = (z) => Math.min(Math.max(z, 1), 6);
            useEffect(() => { zoomRef.current = zoom; }, [zoom]);

            // Pinch-to-zoom
            useEffect(() => {
                const el = wrapRef.current;
                if (!el) return;
                const getDist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
                const onTouchStart = (e) => {
                    if (e.touches.length === 2) pinchRef.current = { startDist: getDist(e.touches), startZoom: zoomRef.current };
                };
                const onTouchMove = (e) => {
                    if (!pinchRef.current || e.touches.length !== 2) return;
                    e.preventDefault();
                    setZoom(clampZoom(pinchRef.current.startZoom * (getDist(e.touches) / pinchRef.current.startDist)));
                };
                const onTouchEnd = () => { pinchRef.current = null; };
                const onWheel = (e) => {
                    if (!e.ctrlKey && !e.metaKey) return;
                    e.preventDefault();
                    setZoom(z => clampZoom(z * (1 - e.deltaY * 0.008)));
                };
                el.addEventListener('touchstart', onTouchStart, { passive: true });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('wheel', onWheel, { passive: false });
                return () => {
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('wheel', onWheel);
                };
            }, []);

            return (
                <div className="bg-white rounded-lg border border-gray-200 mb-6 overflow-hidden">
                    {/* Zoom controls */}
                    <div style={{ position: 'absolute', top: 8, right: 8, zIndex: 20, display: 'flex', gap: 4 }}>
                        <button
                            onClick={() => setZoom(z => clampZoom(z * 1.5))}
                            style={{ width: 24, height: 24, borderRadius: '50%', background: 'white', border: '1px solid #ccc', fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.15)' }}
                        >+</button>
                        <button
                            onClick={() => setZoom(z => clampZoom(z / 1.5))}
                            style={{ width: 24, height: 24, borderRadius: '50%', background: 'white', border: '1px solid #ccc', fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.15)' }}
                        >−</button>
                    </div>
                    <div
                        ref={wrapRef}
                        className="relative bg-gray-50 overflow-auto select-none"
                        style={{ height: 280, WebkitOverflowScrolling: 'touch' }}
                    >
                        <div style={{
                            position: 'relative',
                            width: `${zoom * 100}%`,
                            transformOrigin: hasRealPos ? `${device.pinX}% ${device.pinY}%` : 'center center'
                        }}>
                            <img src={mapImage} alt="Floor plan" className="map-image" />
                            {/* Only show pin markers if real positions exist */}
                            {hasRealPos && devs.map((d) => {
                                if (!d.pinX || !d.pinY) return null;
                                const isCurrent = d.number === device.number;
                                return (
                                    <button
                                        key={d.number}
                                        onClick={() => onSelectDevice && onSelectDevice(d)}
                                        className={`device-pin ${isCurrent ? 'completed' : ''}`}

                                            left: `${d.pinX}%`,
                                            top: `${d.pinY}%`,

                                            border: isCurrent ? '2px solid #16a34a' : '1.5px solid rgba(255,255,255,0.9)',
                                            boxShadow: isCurrent
                                                ? '0 0 0 3px rgba(34,197,94,0.3), 0 3px 8px rgba(0,0,0,0.2)'
                                                : '0 1px 4px rgba(107,78,255,0.3)',
                                            zIndex: isCurrent ? 10 : 5
                                        }}

                                        {d.number}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // FLOOR SCREEN
        // ============================================

        function FloorScreen({ project, floor, user, onBack, onSelectDevice, onFloorDataUpdate }) {
            const [floorData, setFloorData] = useState(floor);
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [highlightDevice, setHighlightDevice] = useState(null);
            const fileInputRef = useRef(null);

            const isLocked = project.locked && !isVSEmployee(user.email);
            const canEdit = !isLocked;

            const handlePdfUpload = async (file) => {
                if (!file.type.includes('pdf')) {
                    alert('Please upload a PDF file');
                    return;
                }

                setUploading(true);
                try {
                    // Read file as ArrayBuffer
                    const pdfData = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = (e) => reject(e);
                        reader.readAsArrayBuffer(file);
                    });

                    // PDF.js transfers buffer ownership, so copy for each call
                    const mapImageDataUrl = await extractMapImage(pdfData.slice(0));
                    const parsedDevices = await parsePdfDevices(pdfData.slice(0));
                    const positions = await extractDevicePositions(pdfData.slice(0), parsedDevices);

                    // Upload map image to Firebase Storage (too large for Firestore)
                    const mapBlob = await fetch(mapImageDataUrl).then(r => r.blob());
                    const mapStoragePath = `installAudits/${project.id}/floors/${floor.id}/map.png`;
                    const mapRef = storage.ref(mapStoragePath);
                    await mapRef.put(mapBlob, { contentType: 'image/png' });
                    const mapImage = await mapRef.getDownloadURL();

                    // Get existing floor devices for auto-detection
                    const existingDevices = floorData.devices || [];

                    // Two-pass auto-detection: first detect GWs and EN1s, then classify area sensors
                    const firstPass = parsedDevices.map(device => {
                        const name = device.name.toUpperCase();
                        const firmware = device.firmware || '';
                        const battery = (device.battery || '').toUpperCase();
                        if (/^([0-9A-F]{2}:){5}[0-9A-F]{2}$/i.test(device.name)) return { ...device, detectedType: 'EN1' };
                        if ((battery === 'WIRED' && firmware.startsWith('1.')) || name.startsWith('H00-')) return { ...device, detectedType: 'GW' };
                        return { ...device, detectedType: '' };
                    });
                    const hasGateway = firstPass.some(d => d.detectedType === 'GW');

                    const deviceObjects = firstPass.map(device => {
                        const existing = existingDevices.find(d => d.number === device.number);
                        const pos = positions[device.number] || { pinX: 0, pinY: 0 };
                        let deviceType = device.detectedType;
                        if (!deviceType) deviceType = hasGateway ? 'L410' : 'E106';

                        return {
                            number: device.number,
                            name: device.name,
                            status: device.status,
                            state: device.state,
                            deviceType: existing?.deviceType || deviceType || '',
                            pinX: existing?.pinX || pos.pinX,
                            pinY: existing?.pinY || pos.pinY,
                            photo: existing?.photo || '',
                            notes: existing?.notes || '',
                            complete: existing?.complete || false
                        };
                    });

                    // Upload PDF to Firebase Storage
                    const storagePath = `installAudits/${project.id}/floors/${floor.id}/${file.name}`;
                    const fileRef = storage.ref(storagePath);
                    await fileRef.put(file);
                    const pdfUrl = await fileRef.getDownloadURL();

                    // Save to Firestore
                    await db.collection('installAudits')
                        .doc(project.id)
                        .collection('floors')
                        .doc(floor.id)
                        .update({
                            pdfUrl: pdfUrl,
                            pdfMapImage: mapImage,
                            devices: deviceObjects,
                            updatedAt: new Date()
                        });

                    // Update project total device count and status
                    const allFloorsSnap = await db.collection('installAudits').doc(project.id).collection('floors').get();
                    let total = 0;
                    allFloorsSnap.forEach(f => { total += (f.data().devices?.length || 0); });
                    await db.collection('installAudits').doc(project.id).update({
                        totalDevices: total,
                        status: project.status === 'not_started' ? 'in_progress' : project.status
                    });

                    const updatedFloor = {
                        ...floorData,
                        pdfMapImage: mapImage,
                        devices: deviceObjects,
                        pdfUrl: pdfUrl
                    };
                    setFloorData(updatedFloor);
                    // Notify parent so DeviceScreen gets fresh floor data
                    if (onFloorDataUpdate) onFloorDataUpdate(updatedFloor);

                    alert('PDF uploaded and processed successfully!');
                } catch (err) {
                    console.error('Error uploading PDF:', err);
                    alert('Failed to upload PDF: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const deviceCount = floorData.devices?.length || 0;
            const completedCount = floorData.devices?.filter(d => d.complete)?.length || 0;

            return (
                <div className="w-full min-h-screen bg-gray-50">
                    <div className="custom-purple-bg text-white">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <button
                                onClick={onBack}
                                className="text-purple-100 hover:text-white mb-4 font-semibold"
                            >
                                ← Back to Project
                            </button>
                            <h1 className="text-3xl font-bold">{floorData.floorName}</h1>
                            <p className="text-purple-100 mt-1">{project.projectName}</p>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {isLocked && (
                            <div className="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <p className="text-blue-800 font-semibold">Submitted - Read Only</p>
                            </div>
                        )}

                        {!floorData.pdfMapImage ? (
                            <div className="bg-white rounded-lg border border-gray-200 p-12 text-center">
                                <p className="text-gray-600 text-lg mb-6">No device management overview uploaded yet</p>
                                {canEdit && (
                                    <>
                                        <input
                                            ref={fileInputRef}
                                            type="file"
                                            accept=".pdf"
                                            onChange={(e) => e.target.files[0] && handlePdfUpload(e.target.files[0])}
                                        />
                                        <button
                                            onClick={() => fileInputRef.current?.click()}
                                            disabled={uploading}
                                            className="custom-purple-bg text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                                        >
                                            {uploading ? 'Processing...' : 'Upload Device Management Overview'}
                                        </button>
                                    </>
                                )}
                            </div>
                        ) : (
                            <>
                                {/* Progress */}
                                <div className="bg-white rounded-lg border border-gray-200 p-6 mb-8">
                                    <p className="text-gray-600 text-sm mb-2">Completion Status</p>
                                    <div className="w-full bg-gray-200 rounded-full h-3">
                                        <div
                                            className="custom-purple-bg h-3 rounded-full transition-all"
                                            style={{ width: `${deviceCount > 0 ? Math.round((completedCount / deviceCount) * 100) : 0}%` }}
                                        />
                                    </div>
                                    <p className="text-lg font-bold text-gray-900 mt-3">
                                        {completedCount} of {deviceCount} devices complete
                                    </p>
                                </div>

                                {/* Map and Devices */}
                                {/* Map — full width on mobile, 2/3 on desktop */}
                                <div className="mb-6">
                                    <FloorPlanMap
                                        mapImage={floorData.pdfMapImage}
                                        devices={floorData.devices || []}
                                        onSelectDevice={(d) => canEdit && onSelectDevice(d)}
                                        highlightDevice={highlightDevice}
                                    />
                                    <p className="text-xs text-gray-400 mt-2 text-center">
                                        Pinch to zoom • Device numbers are labeled on the floor plan
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Device List */}
                                    <div className="lg:col-span-3">
                                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                                            <h3 className="text-lg font-bold text-gray-900 mb-4">Devices ({deviceCount})</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                                                {floorData.devices?.map(device => (
                                                    <div
                                                        key={device.number}
                                                        className={`p-3 rounded-lg border transition ${
                                                            highlightDevice?.number === device.number
                                                                ? 'border-purple-500 bg-purple-50 ring-2 ring-purple-300'
                                                                : device.complete
                                                                    ? 'bg-green-50 border-green-200'
                                                                    : 'bg-gray-50 border-gray-200'
                                                        }`}
                                                    >
                                                        <div className="flex items-center justify-between">
                                                            <div
                                                                className="flex-1 cursor-pointer"
                                                                onClick={() => {
                                                                    if (canEdit) onSelectDevice(device);
                                                                }}
                                                            >
                                                                <p className="font-semibold text-gray-900 text-sm">
                                                                    #{device.number} {formatDeviceName(device) || ''}
                                                                </p>
                                                                <p className="text-xs text-gray-500">
                                                                    {device.deviceType || '?'} {device.complete ? '• Done' : ''}
                                                                </p>
                                                            </div>
                                                            <div className="flex items-center gap-1">
                                                                {device.complete && (
                                                                    <span className="text-green-600 font-bold text-sm">✓</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {canEdit && (
                                    <div className="mt-8">
                                        <input
                                            ref={fileInputRef}
                                            type="file"
                                            accept=".pdf"
                                            onChange={(e) => e.target.files[0] && handlePdfUpload(e.target.files[0])}
                                            style={{ display: 'none' }}
                                        />
                                        <button
                                            onClick={() => fileInputRef.current?.click()}
                                            disabled={uploading}
                                            className="text-gray-600 hover:text-gray-800 font-semibold py-2 px-4"
                                        >
                                            {uploading ? 'Processing...' : 'Re-upload Overview'}
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // DEVICE SCREEN
        // ============================================

        function DeviceScreen({ project, floor, device, user, onBack, onSave }) {
            const [deviceData, setDeviceData] = useState(device);
            const [saving, setSaving] = useState(false);
            const [errors, setErrors] = useState({});
            const photoInputRef = useRef(null);

            const isLocked = project.locked && !isVSEmployee(user.email);

            const handleChange = (field, value) => {
                setDeviceData(prev => ({ ...prev, [field]: value }));
            };

            const [photoFile, setPhotoFile] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(device.photo || '');
            const [uploadingPhoto, setUploadingPhoto] = useState(false);

            const handlePhotoUpload = async (file) => {
                if (!file.type.includes('image')) {
                    alert('Please upload an image file');
                    return;
                }
                setPhotoFile(file);
                // Show local preview immediately
                const reader = new FileReader();
                reader.onload = (e) => {
                    setPhotoPreview(e.target.result);
                    setDeviceData(prev => ({ ...prev, photo: 'pending_upload' }));
                };
                reader.readAsDataURL(file);
            };

            const validateAndSave = async () => {
                const newErrors = {};

                if (!deviceData.deviceType) {
                    newErrors.deviceType = 'Device type is required';
                }

                if (!deviceData.photo && !photoFile) {
                    newErrors.photo = 'Photo is required';
                }

                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }

                setSaving(true);
                try {
                    // Upload photo to Firebase Storage if new file selected
                    let photoUrl = deviceData.photo;
                    if (photoFile) {
                        setUploadingPhoto(true);
                        const storagePath = `installAudits/${project.id}/floors/${floor.id}/device_${deviceData.number}_${Date.now()}.${photoFile.name.split('.').pop()}`;
                        const fileRef = storage.ref(storagePath);
                        await fileRef.put(photoFile);
                        photoUrl = await fileRef.getDownloadURL();
                        setUploadingPhoto(false);
                    }

                    // Save device to Firestore
                    const floorsRef = db.collection('installAudits').doc(project.id).collection('floors');
                    const floorDoc = await floorsRef.doc(floor.id).get();
                    const floorData = floorDoc.data();

                    const updatedDevices = floorData.devices.map(d =>
                        d.number === deviceData.number
                            ? { ...deviceData, photo: photoUrl, complete: true }
                            : d
                    );

                    await floorsRef.doc(floor.id).update({
                        devices: updatedDevices
                    });

                    onSave({ ...deviceData, photo: photoUrl, complete: true });
                } catch (err) {
                    console.error('Error saving device:', err);
                    alert('Failed to save device. Please try again.');
                } finally {
                    setSaving(false);
                }
            };

            return (
                <div className="w-full min-h-screen bg-gray-50">
                    <div className="custom-purple-bg text-white">
                        <div className="max-w-2xl mx-auto px-4 py-6">
                            <button
                                onClick={onBack}
                                className="text-purple-100 hover:text-white mb-4 font-semibold"
                            >
                                ← Back to Floor
                            </button>
                            <h1 className="text-3xl font-bold">Device #{deviceData.number}</h1>
                            {formatDeviceName(deviceData) && (
                                <p className="text-purple-100 mt-1">{formatDeviceName(deviceData)}</p>
                            )}
                        </div>
                    </div>

                    <div className="max-w-2xl mx-auto px-4 py-8">
                        {isLocked && (
                            <div className="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <p className="text-blue-800 font-semibold">Read Only</p>
                            </div>
                        )}

                        {/* Zoomed Map View */}
                        {floor.pdfMapImage && (
                            <ZoomedPreview
                                mapImage={floor.pdfMapImage}
                                device={deviceData}
                                allDevices={floor.devices || []}
                                onSelectDevice={(d) => {
                                    if (d.number !== deviceData.number) {
                                        setDeviceData(d);
                                        setPhotoPreview(d.photo || '');
                                        setPhotoFile(null);
                                        setErrors({});
                                    }

                        <div className="bg-white rounded-lg border border-gray-200 p-8">
                            <div className="space-y-6">
                                {/* Auto-populated fields */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Status</label>

                                            {deviceData.status}
                                        </p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">State</label>
                                        <p className="px-4 py-2 bg-gray-100 rounded-lg text-gray-900">
                                            {deviceData.state}
                                        </p>
                                    </div>
                                </div>

                                {/* Device Type - Required */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                                        Device Type * {errors.deviceType && <span className="text-red-600">{errors.deviceType}</span>}

                                    <select
                                        value={deviceData.deviceType}
                                        onChange={(e) => {
                                            handleChange('deviceType', e.target.value);
                                            setErrors(prev => ({ ...prev, deviceType: '' }));

                                        disabled={isLocked}

                                    >
