                                        <option value="L410">L410</option>
                                        <option value="E106">E106</option>
                                        <option value="EN1">EN1</option>
                                    </select>
                                </div>

                                {/* Photo - Required */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                                        Photo * {errors.photo && <span className="text-red-600">{errors.photo}</span>}
                                    </label>
                                    {(photoPreview || deviceData.photo) && (
                                        <div className="mb-4">
                                            <img
                                                src={photoPreview || deviceData.photo}
                                                alt="Device"
                                                className="max-h-64 rounded-lg border border-gray-200"
                                            />
                                        </div>
                                    )}
                                    {!isLocked && (
                                        <>
                                            <input
                                                ref={photoInputRef}
                                                type="file"
                                                accept="image/*"
                                                onChange={(e) => e.target.files[0] && handlePhotoUpload(e.target.files[0])}
                                                style={{ display: 'none' }}
                                            />
                                            <button
                                                onClick={() => photoInputRef.current?.click()}
                                                className="w-full border-2 border-dashed border-gray-300 rounded-lg p-6 hover:border-purple-500 text-gray-600 hover:text-purple-600 transition font-semibold"
                                            >
                                                {(photoPreview || deviceData.photo) ? 'Change Photo' : 'Upload Photo'}
                                            </button>
                                        </>
                                    )}
                                </div>

                                {/* Notes - Optional */}
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Notes (Optional)</label>
                                    <textarea
                                        value={deviceData.notes}
                                        onChange={(e) => handleChange('notes', e.target.value)}
                                        disabled={isLocked}
                                        placeholder="Any additional notes about this device..."
                                        rows={4}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 disabled:bg-gray-100"
                                    />
                                </div>

                                {/* Save Button */}
                                {!isLocked && (
                                    <div className="flex gap-4 pt-6">
                                        <button
                                            onClick={validateAndSave}
                                            disabled={saving}
                                            className="flex-1 custom-purple-bg text-white py-3 px-4 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                                        >
                                            {saving ? (uploadingPhoto ? 'Uploading photo...' : 'Saving...') : 'Save & Mark Complete'}
                                        </button>
                                        <button
                                            onClick={onBack}
                                            className="flex-1 bg-gray-300 text-gray-800 py-3 px-4 rounded-lg font-semibold hover:bg-gray-400"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                )}

                                {isLocked && (
                                    <div className="pt-6">
                                        <button
                                            onClick={onBack}
                                            className="w-full bg-gray-300 text-gray-800 py-3 px-4 rounded-lg font-semibold hover:bg-gray-400"
                                        >
                                            Back
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // SUMMARY SCREEN
        // ============================================

        function SummaryScreen({ project, user, onBack, onSubmit }) {
            const [floors, setFloors] = useState([]);
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [techName, setTechName] = useState(getTechName());

            useEffect(() => {
                const unsubscribe = db.collection('installAudits')
                    .doc(project.id)
                    .collection('floors')
                    .orderBy('floorName')
                    .onSnapshot((snapshot) => {
                        setFloors(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, [project.id]);

            const totalDevices = floors.reduce((acc, f) => acc + (f.devices?.length || 0), 0);
            const completedDevices = floors.reduce((acc, f) => acc + (f.devices?.filter(d => d.complete)?.length || 0), 0);

            const deviceCounts = { GW: 0, L410: 0, E106: 0, EN1: 0 };
            floors.forEach(floor => {
                floor.devices?.forEach(device => {
                    if (device.deviceType && deviceCounts.hasOwnProperty(device.deviceType)) {
                        deviceCounts[device.deviceType]++;
                    }
                });
            });

            const isLocked = project.locked;
            const isVS = isVSEmployee(user.email);

            const handleSubmit = async () => {
                if (!isVS && !techName.trim()) {
                    alert('Please enter your name');
                    return;
                }

                if (completedDevices < totalDevices) {
                    alert(`Please complete all ${totalDevices - completedDevices} remaining device(s) before submitting.`);
                    return;
                }

                setSubmitting(true);
                try {
                    const now = new Date();
                    const finalTechName = isVS ? (project.techName || 'VS Employee') : techName.trim();

                    // Update project status
                    await db.collection('installAudits').doc(project.id).update({
                        status: 'submitted',
                        locked: true,
                        submittedAt: now,
                        techName: finalTechName
                    });

                    // Prepare webhook payload
                    const payload = {
                        projectName: project.projectName,
                        siteName: project.siteName,
                        address: project.address,
                        techName: finalTechName,
                        vsContact: project.vsContact,
                        vsContactName: project.vsContactName,
                        submittedAt: now.toISOString(),
                        totalDevices: totalDevices,
                        deviceCounts: deviceCounts,
                        floors: floors.map(floor => ({
                            floorName: floor.floorName,
                            deviceCount: floor.devices?.length || 0,
                            devices: floor.devices?.map(d => ({
                                number: d.number,
                                name: d.name,
                                type: d.deviceType,
                                status: d.status,
                                notes: d.notes,
                                photoUrl: d.photo
                            })) || []
                        }))
                    };

                    // Send webhook if configured
                    if (N8N_WEBHOOK_URL !== 'REPLACE_WITH_WEBHOOK_URL') {
                        try {
                            await fetch(N8N_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                        } catch (err) {
                            console.error('Webhook send failed:', err);
                        }
                    }

                    alert('Project submitted successfully!');
                    saveTechName(finalTechName);
                    onSubmit();
                } catch (err) {
                    console.error('Error submitting project:', err);
                    alert('Failed to submit project. Please try again.');
                } finally {
                    setSubmitting(false);
                }
            };

            if (loading) {
                return (
                    <div className="w-full min-h-screen bg-gray-50 flex items-center justify-center">
                        <p className="text-gray-500">Loading summary...</p>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen bg-gray-50">
                    <div className="custom-purple-bg text-white">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <button
                                onClick={onBack}
                                className="text-purple-100 hover:text-white mb-4 font-semibold"
                            >
                                ← Back
                            </button>
                            <h1 className="text-3xl font-bold">Summary & Submit</h1>
                            <p className="text-purple-100 mt-1">{project.projectName}</p>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {isLocked && !isVS && (
                            <div className="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <p className="text-blue-800 font-semibold">Submitted - Read Only</p>
                            </div>
                        )}

                        {/* Summary Stats */}
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <p className="text-gray-600 text-sm">Total Devices</p>
                                <p className="text-3xl font-bold text-gray-900 mt-2">{totalDevices}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <p className="text-gray-600 text-sm">Completed</p>
                                <p className="text-3xl font-bold custom-purple mt-2">{completedDevices}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <p className="text-gray-600 text-sm">Progress</p>
                                <p className="text-3xl font-bold text-gray-900 mt-2">
                                    {totalDevices > 0 ? Math.round((completedDevices / totalDevices) * 100) : 0}%
                                </p>
                            </div>
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <p className="text-gray-600 text-sm">Status</p>
                                <span className={`status-badge ${project.status} block mt-2 w-fit`}>
                                    {project.status.replace('_', ' ').toUpperCase()}
                                </span>
                            </div>
                        </div>

                        {/* Device Type Breakdown */}
                        <div className="bg-white rounded-lg border border-gray-200 p-6 mb-8">
                            <h2 className="text-xl font-bold text-gray-900 mb-4">Device Types</h2>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                <div>
                                    <p className="text-gray-600 text-sm">Gateway (GW)</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-1">{deviceCounts.GW}</p>
                                </div>
                                <div>
                                    <p className="text-gray-600 text-sm">L410</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-1">{deviceCounts.L410}</p>
                                </div>
                                <div>
                                    <p className="text-gray-600 text-sm">E106</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-1">{deviceCounts.E106}</p>
                                </div>
                                <div>
                                    <p className="text-gray-600 text-sm">EN1</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-1">{deviceCounts.EN1}</p>
                                </div>
                            </div>
                        </div>

                        {/* Floor-by-Floor */}
                        <div className="bg-white rounded-lg border border-gray-200 p-6 mb-8">
                            <h2 className="text-xl font-bold text-gray-900 mb-4">Floor Breakdown</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-gray-200">
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">Floor</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">Devices</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">GW</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">L410</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">E106</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">EN1</th>
                                            <th className="text-left py-3 px-4 font-semibold text-gray-700">Complete</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {floors.map(floor => {
                                            const floorDeviceCount = floor.devices?.length || 0;
                                            const floorCompleted = floor.devices?.filter(d => d.complete)?.length || 0;
                                            const floorCounts = { GW: 0, L410: 0, E106: 0, EN1: 0 };
                                            floor.devices?.forEach(d => {
                                                if (d.deviceType && floorCounts.hasOwnProperty(d.deviceType)) {
                                                    floorCounts[d.deviceType]++;
                                                }
                                            });

                                            return (
                                                <tr key={floor.id} className="border-b border-gray-200 hover:bg-gray-50">
                                                    <td className="py-3 px-4 font-semibold text-gray-900">{floor.floorName}</td>
                                                    <td className="py-3 px-4 text-gray-700">{floorDeviceCount}</td>
                                                    <td className="py-3 px-4 text-gray-700">{floorCounts.GW}</td>
                                                    <td className="py-3 px-4 text-gray-700">{floorCounts.L410}</td>
                                                    <td className="py-3 px-4 text-gray-700">{floorCounts.E106}</td>
                                                    <td className="py-3 px-4 text-gray-700">{floorCounts.EN1}</td>
                                                    <td className="py-3 px-4 font-semibold">
                                                        <span className={floorCompleted === floorDeviceCount ? 'text-green-600' : 'text-orange-600'}>
                                                            {floorCompleted} / {floorDeviceCount}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Tech Name Input */}
                        {!isLocked && !isVS && (
                            <div className="bg-white rounded-lg border border-gray-200 p-6 mb-8">
                                <h2 className="text-xl font-bold text-gray-900 mb-4">Technician Information</h2>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Your Name *</label>
                                    <input
                                        type="text"
                                        value={techName}
                                        onChange={(e) => setTechName(e.target.value)}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                    />
                                </div>
                            </div>
                        )}

                        {/* Submit Button */}
                        {!isLocked ? (
                            <div className="flex gap-4">
                                <button
                                    onClick={handleSubmit}
                                    disabled={submitting || completedDevices < totalDevices}
                                    className="flex-1 custom-purple-bg text-white py-3 px-4 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                                >
                                    {submitting ? 'Submitting...' : 'Submit Project'}
                                </button>
                                <button
                                    onClick={onBack}
                                    className="flex-1 bg-gray-300 text-gray-800 py-3 px-4 rounded-lg font-semibold hover:bg-gray-400"
                                >
                                    Back
                                </button>
                            </div>
                        ) : (
                            <div>
                                <button
                                    onClick={onBack}
                                    className="w-full bg-gray-300 text-gray-800 py-3 px-4 rounded-lg font-semibold hover:bg-gray-400"
                                >
                                    Back
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // MAIN APP COMPONENT
        // ============================================

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [screen, setScreen] = useState('list');
            const [currentProject, setCurrentProject] = useState(null);
            const [currentFloor, setCurrentFloor] = useState(null);
            const [currentDevice, setCurrentDevice] = useState(null);
            const [isTechMode, setIsTechMode] = useState(false);

            const handleSignOut = async () => {
                try {
                    await auth.signOut();
                    setUser(null);
                    setScreen('list');
                    setCurrentProject(null);
                    setCurrentFloor(null);
                    setCurrentDevice(null);
                    setIsTechMode(false);
                } catch (err) {
                    console.error('Sign out failed:', err);
                }
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((authUser) => {
                    if (authUser) {
                        const email = authUser.email || 'tech@vergesense.app';
                        setUser({ uid: authUser.uid, email: email });
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="w-full min-h-screen bg-white flex items-center justify-center">
                        <p className="text-gray-500 text-lg">Loading...</p>
                    </div>
                );
            }

            if (!user) {
                return (
                    <AuthScreen
                        onAuthComplete={() => setScreen('list')}
                        onTechCodeAuth={(project, name) => {
                            setCurrentProject(project);
                            setIsTechMode(true);
                            setScreen('project');
                        }}
                    />
                );
            }

            if (screen === 'list') {
                return (
                    <ProjectListScreen
                        user={user}
                        onSelectProject={(project) => {
                            setCurrentProject(project);
                            setScreen('project');
                        }}
                        onNewProject={() => setScreen('newProject')}
                        onSignOut={handleSignOut}
                    />
                );
            }

            if (screen === 'newProject') {
                return (
                    <NewProjectScreen
                        user={user}
                        onProjectCreated={() => setScreen('list')}
                        onCancel={() => setScreen('list')}
                    />
                );
            }

            if (screen === 'project' && currentProject) {
                return (
                    <ProjectDetailScreen
                        project={currentProject}
                        user={user}
                        onSelectFloor={(floor) => {
                            setCurrentFloor(floor);
                            setScreen('floor');
                        }}
                        onBack={() => setScreen('list')}
                        onSummary={() => setScreen('summary')}
                        onUnlock={async () => {
                            await db.collection('installAudits').doc(currentProject.id).update({ locked: false, status: 'in_progress' });
                            setCurrentProject({ ...currentProject, locked: false, status: 'in_progress' });
                        }}
                        onSignOut={handleSignOut}
                        isTechMode={isTechMode}
                        onDeleteProject={async (proj) => {
                            try {
                                // Delete all floors subcollection first
                                const floorsSnap = await db.collection('installAudits').doc(proj.id).collection('floors').get();
                                const batch = db.batch();
                                floorsSnap.docs.forEach(doc => batch.delete(doc.ref));
                                batch.delete(db.collection('installAudits').doc(proj.id));
                                await batch.commit();
                                setCurrentProject(null);
                                setScreen('list');
                            } catch (err) {
                                console.error('Error deleting project:', err);
                                alert('Failed to delete project: ' + err.message);
                            }
                        }}
                        onDeleteFloor={async (floorToDelete) => {
                            try {
                                await db.collection('installAudits').doc(currentProject.id)
                                    .collection('floors').doc(floorToDelete.id).delete();
                                // Update project device count
                                const remainingFloors = await db.collection('installAudits')
                                    .doc(currentProject.id).collection('floors').get();
                                let total = 0;
                                remainingFloors.forEach(f => { total += (f.data().devices?.length || 0); });
                                await db.collection('installAudits').doc(currentProject.id).update({
                                    totalDevices: total,
                                    numFloors: remainingFloors.size
                                });
                            } catch (err) {
                                console.error('Error deleting floor:', err);
                                alert('Failed to delete floor: ' + err.message);
                            }
                        }}
                    />
                );
            }

            if (screen === 'floor' && currentProject && currentFloor) {
                return (
                    <FloorScreen
                        project={currentProject}
                        floor={currentFloor}
                        user={user}
                        onBack={() => setScreen('project')}
                        onFloorDataUpdate={(updatedFloor) => setCurrentFloor(updatedFloor)}
                        onSelectDevice={(device) => {
                            setCurrentDevice(device);
                            setScreen('device');
                        }}
                    />
                );
            }

            if (screen === 'device' && currentProject && currentFloor && currentDevice) {
                return (
                    <DeviceScreen
                        project={currentProject}
                        floor={currentFloor}
                        device={currentDevice}
                        user={user}
                        onBack={() => setScreen('floor')}
                        onSave={(device) => {
                            setCurrentDevice(device);
                            setScreen('floor');
                        }}
                    />
                );
            }

            if (screen === 'summary' && currentProject) {
                return (
                    <SummaryScreen
                        project={currentProject}
                        user={user}
                        onBack={() => setScreen('project')}
                        onSubmit={() => setScreen('list')}
                    />
                );
            }

            return (
                <ProjectListScreen
                    user={user}
                    onSelectProject={(project) => {
                        setCurrentProject(project);
                        setScreen('project');
                    }}
                    onNewProject={() => setScreen('newProject')}
                    onSignOut={handleSignOut}
                />
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
